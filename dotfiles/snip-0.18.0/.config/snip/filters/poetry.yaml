name: "poetry"
version: 1
description: "Summarize poetry command output with focus on dependency resolution, install/update actions, and errors"

match:
  command: "poetry"

pipeline:
  - action: "strip_ansi"
  - action: "keep_lines"
    pattern: '^(Installing|Updating|Removing|Resolving dependencies|Package operations|Writing lock file|No dependencies to install|No dependencies to update|Because .*|So, because .*|\s*- .*|warning:|error:|Command .* failed|\s*$)'
  - action: "remove_lines"
    pattern: '^\s*$'
  - action: "head"
    n: 140
    overflow_msg: "+ output truncated"

on_error: "passthrough"
