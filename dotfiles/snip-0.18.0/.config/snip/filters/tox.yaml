name: "tox"
version: 1
description: "Summarize tox runs with focus on env status, failures, and final summary"

match:
  command: "tox"

pipeline:
  - action: "strip_ansi"
  - action: "keep_lines"
    pattern: '^(py[0-9]+|lint|type|\s*commands\[|\s*ERROR:|ERROR:|FAILED|SKIPPED|congratulations|evaluation failed|summary|\s*\d+ passed|\s*\d+ failed|warning:|error:|\s*$)'
  - action: "remove_lines"
    pattern: '^\s*$'
  - action: "head"
    n: 160
    overflow_msg: "+ output truncated"

on_error: "passthrough"
