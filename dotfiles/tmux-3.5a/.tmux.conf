# The default options, generated via `tmux show -g | sed 's/^/set -g /' > tmux.conf`

# Enable terminal focus reporting so Neovim (and other apps) can react to focus gain/loss.
# This improves features like automatic :checktime / autoread of changed files.
set-option -g focus-events on

# Make Escape/prefix-heavy workflows feel snappier, especially in vi copy-mode and Neovim.
set-option -s escape-time 0

set -g remain-on-exit off

set -g activity-action other
set -g assume-paste-time 1
# set -g base-index 0
set -g bell-action any
set -g default-command ""
set -g default-shell "$SHELL"
set -g destroy-unattached off
set -g detach-on-destroy on

# Set the color for active pane borders
set -g display-panes-active-colour red

# Set the color for inactive pane borders
set -g display-panes-colour blue
set -g display-panes-time 1000
set -g display-time 750
set -g history-limit 100000

# Resize panes aggressively when multiple clients with different dimensions attach.
set-window-option -g aggressive-resize on
set -g key-table root
set -g lock-after-time 0
set -g lock-command "lock -np"

# Set the style for command messages
set -g message-command-style fg=yellow,bg=black

# Set the style for status messages
set -g message-style fg=black,bg=yellow
# set -g mouse off
set -g prefix C-a
set -g prefix2 None
# set -g renumber-windows off
set -g repeat-time 500
set -g set-titles off
set -g set-titles-string "#S:#I:#W - \"#T\" #{session_alerts}"
set -g silence-action other
set -g status on
# set -g status-bg green
# set -g status-fg black
set -g status-interval 15
set -g status-justify left
# set -g status-keys vi
set -g status-left "[#S] "
set -g status-left-length 10
set -g status-left-style default
# set -g status-position bottom
# set -g status-right "#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %H:%M %d-%b-%y"
set -g status-right-length 80

# Set the style for the right side of the status line
set -g status-right-style default
# set -g status-style fg=black,bg=green
set -g update-environment[0] "DISPLAY"
set -g update-environment[1] "KRB5CCNAME"
set -g update-environment[2] "SSH_ASKPASS"
set -g update-environment[3] "SSH_AUTH_SOCK"
set -g update-environment[4] "SSH_AGENT_PID"
set -g update-environment[5] "SSH_CONNECTION"
set -g update-environment[6] "WINDOWID"
set -g update-environment[7] "XAUTHORITY"
# Ensure core environment variables (especially PATH) propagate into tmux.
# Prefer launching tmux via a login shell (for example `~/scripts/tmux-login-session.sh`)
# so the server inherits Home Manager session variables and a fresh PATH.
set -g update-environment[8] "PATH"
set -g update-environment[9] "SHELL"
set -g update-environment[10] "HOME"
set -g update-environment[11] "COLORTERM"
set -g update-environment[12] "DBUS_SESSION_BUS_ADDRESS"
set -g update-environment[13] "WAYLAND_DISPLAY"
set -g update-environment[14] "XDG_RUNTIME_DIR"

# Make TPM path explicit for scripts and tooling that rely on the env var.
# Use -F to expand tmux formats like #{HOME}.
set-environment -g -F TMUX_PLUGIN_MANAGER_PATH "#{HOME}/.tmux/plugins"
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g word-separators " "

# set the color for the terminal features
set -g default-terminal "tmux-256color"

# Advertise RGB (truecolor) capability to applications inside tmux.
# Include common outside terminal names as well as the inside tmux terminal.
set-option -as terminal-features ',tmux-256color:RGB'
set-option -as terminal-features ',xterm-256color:RGB'
set-option -as terminal-features ',xterm-kitty:RGB'

# Preserve coloured undercurls for editors such as Neovim diagnostics.
set-option -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set-option -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# set vi mode
set-window-option -g mode-keys vi
set -g status-keys vi

# start indexing from 1, instead of 0
set -g base-index 1
set-window-option -g pane-base-index 1

# Ensure window index numbers get reordered on delete.
set -g renumber-windows on

bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Screen-style conveniences for nested tmux/screen and quick detach/last-window.
bind a send-prefix
bind C-a last-window
bind C-d detach-client

set -g mouse on
set -g set-clipboard on
set -gq allow-passthrough on
set -g automatic-rename on
set -g status-position bottom

# Quick toggles inspired by the sample configs.
bind m set -g mouse \; display-message "mouse #{?mouse,on,off}"
bind y set-window-option synchronize-panes \; display-message "synchronize-panes #{?synchronize-panes,on,off}"

# Set the style for the status line
set -g status-style fg=white,bg=black
#set -g status-fg white
#set -g status-bg black

# set -g status-left

set -g status-right "#{continuum_status}#{?window_bigger,[#{window_offset_x}#,#{window_offset_y}] ,}\"#{=21:pane_title}\" %y-%m-%d %H:%M:%S"

# Selection in copy-mode:
# default tmux mouse bindings can result in a zero-length selection ([0/0]) in some terminals.
bind -T copy-mode-vi MouseDown1Pane send-keys -X begin-selection
bind -T copy-mode-vi MouseDrag1Pane send-keys -X drag-to-cursor
bind -T copy-mode-vi MouseDragEnd1Pane if -F "#{&&:#{selection_present},#{||:#{!=:#{selection_start_x},#{selection_end_x}},#{!=:#{selection_start_y},#{selection_end_y}}}}" "send-keys -X copy-pipe-and-cancel \"#{@copy_cmd}\"" "send-keys -X cancel"

bind -T copy-mode MouseDown1Pane send-keys -X begin-selection
bind -T copy-mode MouseDrag1Pane send-keys -X drag-to-cursor
bind -T copy-mode MouseDragEnd1Pane if -F "#{&&:#{selection_present},#{||:#{!=:#{selection_start_x},#{selection_end_x}},#{!=:#{selection_start_y},#{selection_end_y}}}}" "send-keys -X copy-pipe-and-cancel \"#{@copy_cmd}\"" "send-keys -X cancel"

# Keyboard selection (vi copy-mode)
bind -T copy-mode-vi v send-keys -X begin-selection

# Copy to system clipboard (WSL prefers clip.exe; fall back to wl-copy/xclip)
set -g @copy_cmd 'xclip -in -selection clipboard'
if-shell -b 'command -v wl-copy >/dev/null 2>&1' "set -g @copy_cmd 'wl-copy'" ''

# clip.exe expects UTF-16LE; convert from UTF-8 to avoid mojibake (eg. prompt glyphs).
# NOTE: Do NOT prefix a UTF-16LE BOM (0xFF 0xFE). Some apps paste it as U+FEFF (ZWNBSP).
if-shell -b 'command -v clip.exe >/dev/null 2>&1' "set -g @copy_cmd 'bash -lc \"iconv -f UTF-8 -t UTF-16LE | clip.exe\"'" ''

# Some bindings (eg. Enter/DoubleClick) use copy-pipe without an explicit command.
set -g copy-command "#{@copy_cmd}"

bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "#{@copy_cmd}"

# New windows and panes start in the current path.
bind c new-window -c "#{pane_current_path}"
bind C-c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind Tab select-pane -t :.+

# Dump the current pane's scrollback to ~/tmux.log for quick debugging/sharing.
bind b capture-pane -b temp-capture-buffer -S - \; save-buffer -b temp-capture-buffer ~/tmux.log \; delete-buffer -b temp-capture-buffer \; display-message "Captured pane to ~/tmux.log"

# window selection
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# vim-like pane switching, copied from Dr Disresp- I mean, ThePrimeagen
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind C-h resize-pane -L 4
bind C-j resize-pane -D 4
bind C-k resize-pane -U 4
bind C-l resize-pane -R 4

# Tmux Plugin Manager: https://github.com/tmux-plugins/tpm
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'soyuka/tmux-current-pane-hostname'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# tmux-autoreload needs `apt install entr`
set -g @plugin 'b0o/tmux-autoreload'
set -g @plugin 'tmux-plugins/tmux-cowboy'
set -g @plugin 'thepante/tmux-git-autofetch'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'spywhere/tmux-named-snapshot'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'phil/tmux-devcontainers'
set -g @plugin 'aaronpowell/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
set -g @resurrect-capture-pane-contents 'on'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

set -g @fzf-url-bind 'u'
set-environment -g TMUX_FZF_LAUNCH_KEY 'C-f'
set-environment -g TMUX_FZF_ORDER 'session|pane|window|clipboard|command|keybinding|process'

set -g @forecast-format '%l:+%C+%t+%w+%h'
set -g @forecast-location 'Arnhem'
set -g @forecast-language 'nl'
set -g @forecast-cache-duration '900'

# Explicitly define TPM plugin path to avoid bootstrap ambiguity.
set -g @tpm_path "#{HOME}/.tmux/plugins/"

# TPM bootstrap: auto-clone if missing, then run.
# NOTE: If plugin key bindings or truecolor still fail after multiple reloads,
# run `tmux kill-server` (will close all sessions) and start a fresh tmux—
# some environment changes (focus-events, terminal-features) require a new server.
if-shell "test ! -d #{HOME}/.tmux/plugins/tpm" "run-shell 'git clone https://github.com/tmux-plugins/tpm #{HOME}/.tmux/plugins/tpm'"
if-shell "test -x #{HOME}/.tmux/plugins/tpm/tpm" "run -b #{HOME}/.tmux/plugins/tpm/tpm" "display-message 'TPM script missing or not executable'"

# Override TPM keybindings to ensure a clean bash context and avoid spurious 127s
# when tmux's default run-shell (/bin/sh) encounters environment quirks.
unbind -T prefix I
unbind -T prefix U
bind-key -T prefix I run-shell "bash -lc '#{HOME}/.tmux/plugins/tpm/bindings/install_plugins'"
bind-key -T prefix U run-shell "bash -lc '#{HOME}/.tmux/plugins/tpm/bindings/update_plugins'"
