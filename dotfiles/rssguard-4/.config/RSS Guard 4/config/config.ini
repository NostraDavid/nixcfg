use_toast_notifications=false
use_tray_icon=true
window_is_maximized=false

[keyboard]
m_actionCleanupDatabase=Ctrl+Shift+Del
m_actionClearAllItems=Ctrl+Shift+C
m_actionEditSelectedItem=F2
m_actionFullscreen=F11
m_actionQuit=Ctrl+Q
m_actionSelectNextItem=S
m_actionSelectNextMessage=W
m_actionSelectPreviousItem=A
m_actionSelectPreviousMessage=Q
m_actionSettings=Ctrl+S
m_actionShowOnlyUnreadItems=U
