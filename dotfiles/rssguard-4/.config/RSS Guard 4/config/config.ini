[article_list_searcher]
case_sensitivity=0
criteria=2
search_mode=1

[browser]
custom_external_browser=true
custom_external_email=false
disable_cache=false
external_browser_arguments=\"%1\"
external_browser_executable=firefox-esr
external_email_arguments=
external_email_executable=
external_tools=@Invalid()
open_link_externally_wo_confirmation=true
webengine_chromium_flags=--no-sandbox --enable-smooth-scrolling

[custom_skin_colors]
Allright=#77dd77
FgDisabledFeed=#000000
FgError=#e74343
FgInteresting=#11204f
FgNewMessages=#3a6fe4
FgSelectedError=#ffd7d7
FgSelectedInteresting=#ffffff
FgSelectedNewMessages=#f0f2fc
enabled=false

[feed_list_searcher]
case_sensitivity=0
criteria=2
search_mode=1

[feeds]
auto_expand_on_selection=false
auto_update_enabled=true
auto_update_fast=false
auto_update_interval=86400
auto_update_only_unfocused=false
count_format=(%unread)
customize_list_font=false
feed_update_timeout=30000
feeds_update_on_startup=true
