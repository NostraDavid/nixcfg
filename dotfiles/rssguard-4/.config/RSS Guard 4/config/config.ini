forced_skin_colors=true
height_row_feeds=-1
height_row_messages=-1
hide_tabbar_one_tab=false
hide_when_minimized=false
icon_theme_name=
main_menu_visible=true
messages_toolbar="m_actionMarkSelectedMessagesAsRead,m_actionMarkSelectedMessagesAsUnread,m_actionSwitchImportanceOfSelectedMessages,separator,highlighter[],filter[],spacer,search"
monochrome_tray_icon=false
msg_view_state=""
show_unread_numbers_in_tray_icon=true
show_unread_numbers_on_task_bar=true
skin=nudus-dark
splitter_feeds=336, 1571
splitter_messages_horizontal=681, 889
splitter_messages_is_vertical=false
splitter_messages_vertical=1275, 705
