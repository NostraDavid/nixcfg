[gui]
alternate_colors_in_lists=true
colored_busy_tray_icon=false
default_sort_column_feeds=0
default_sort_order_feeds=0
enable_list_headers=true
enable_notifications=true
enable_status_bar=true
enable_toolbars=false
feed_view_state=eyJoZWFkZXJfMF9zaXplIjoyNDYsImhlYWRlcl8xX3NpemUiOjkwLCJoZWFkZXJfY291bnQiOjJ9
