# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# `prev_bg` is a special variable that sets the background color to the previous
# module's background color, which is useful for creating a seamless transition between
# modules. For example, you can use it to create a seamless transition between the
# `directory` and `git_branch` modules.

# You can also override fg and bg colors for each module. `fg:prev_bg fg:light_bg` means
# that the foreground color is the previous module's background color, but if there is
# no previous module, it will be the light_bg color. The same logic applies to the
# background color.

# == current prompt ==
format = """
$python\
${custom.py_git_sep}\
${custom.git_branch_clean}${custom.git_branch_dirty}\
$git_status\
${custom.git_dir_sep}\
$directory\
$jobs\
$status\
$character\
"""

# == prompt settings ==
# https://starship.rs/config/#prompt
add_newline = false
command_timeout = 2000
scan_timeout = 60
palette = 'powerline_status'

[palettes.powerline_status]
term_bg = '#121212'
dark_bg = '#303030'
light_bg = '#585858'
pyth = '#26b446' # green
stat = '#d75f00' # orange

# git_status colors
orange = '#ffaf00'
white = '#ffffff'
darkcyan = '#5fafd7'
darkestgreen = '#005f00'
mediumgreen = '#008000'
brightgreen = '#afd700'
brightyellow = '#ffd700'
mediumorange = '#d75f00'
darkestred = '#5f0000'
gray0 = '#121212'
gray4 = '#585858'
gray9 = '#bcbcbc'
gray10 = '#d0d0d0'
gray2 = '#303030'
gray8 = '#9e9e9e'
brightred = '#d70000'
mediumpurple = '#875fd7'
brightestorange = '#ffaf00'
darkblue = '#005faf'

# == current prompt settings ==
[python]
style = 'bold fg:white bg:darkcyan'
format = "[ $virtualenv ]($style)"
detect_files = []
detect_extensions = []
detect_folders = []

[custom.py_git_sep]
command = "printf ''"
when = 'test -n "$VIRTUAL_ENV"'
require_repo = true
format = "[Ņé░](fg:prev_bg bg:gray2)"
shell = ["bash", "--noprofile", "--norc"]

[git_branch]
style = 'fg:gray9 bg:gray2'
format = """
[ $symbol $branch]($style)\
"""
symbol = 'ŅéĀ'
truncation_length = 12
truncation_symbol = 'ŌĆ”'
only_attached = true
disabled = true # replaced by custom.git_branch_clean / custom.git_branch_dirty for conditional coloring

# Custom branch modules to color branch green when repo is clean, gray otherwise.
# We split into two modules with mutually exclusive 'when' conditions for clarity & minimal logic.
[custom.git_branch_clean]
command = "b=$(git symbolic-ref --quiet --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null); printf 'ŅéĀ %s' \"$b\""
when = 'test -z "$(git status --porcelain 2>/dev/null)"'
require_repo = true
format = "[ $output](fg:mediumgreen bg:gray2)"
shell = ["bash", "--noprofile", "--norc"]

[custom.git_branch_dirty]
command = "b=$(git symbolic-ref --quiet --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null); printf 'ŅéĀ %s' \"$b\""
when = 'test -n "$(git status --porcelain 2>/dev/null)"'
require_repo = true
format = "[ $output](fg:gray9 bg:gray2)"
shell = ["bash", "--noprofile", "--norc"]


# [git_status]
# style = 'bg:dark_bg'
# format = '[ $all_status$ahead_behind ]($style)'

# - ŅéĀ   : branch name or commit hash
# - Ōśģ   : most recent tag (if enabled)
# - Ōåō   : n commits behind
# - Ōåæ   : n commits ahead
# - ŌŚÅ   : n staged files
# - Ō£¢   : n unmerged files (conflicts)
# - Ō£Ü   : n changed files
# - ŌĆ”   : n untracked files
# - ŌÜæ   : n stashed files

# "gitstatus":                 { "fg": "gray8",           "bg": "gray2", "attrs": [] },
# "gitstatus_branch":          { "fg": "gray8",           "bg": "gray2", "attrs": [] },
# "gitstatus_branch_clean":    { "fg": "green",           "bg": "gray2", "attrs": [] },
# "gitstatus_branch_dirty":    { "fg": "gray8",           "bg": "gray2", "attrs": [] },
# "gitstatus_branch_detached": { "fg": "mediumpurple",    "bg": "gray2", "attrs": [] },
# "gitstatus_behind":          { "fg": "gray10",          "bg": "gray2", "attrs": [] },
# "gitstatus_ahead":           { "fg": "gray10",          "bg": "gray2", "attrs": [] },
# "gitstatus_staged":          { "fg": "green",           "bg": "gray2", "attrs": [] },
# "gitstatus_unmerged":        { "fg": "brightred",       "bg": "gray2", "attrs": [] },
# "gitstatus_changed":         { "fg": "mediumorange",    "bg": "gray2", "attrs": [] },
# "gitstatus_untracked":       { "fg": "brightestorange", "bg": "gray2", "attrs": [] },
# "gitstatus_stashed":         { "fg": "darkblue",        "bg": "gray2", "attrs": [] }

[git_status]
style = 'fg:gray8 bg:prev_bg'
format = """[ \
$ahead_behind\
$staged\
$conflicted\
$modified\
$untracked\
$stashed\
$deleted\
$renamed\
$typechanged\
 ]($style)\
"""
behind = '[Ōåō ${count}](fg:white bg:prev_bg) '
ahead = '[Ōåæ ${count}](fg:white bg:prev_bg) '
staged = '[ŌŚÅ ${count}](fg:green bg:prev_bg) '
conflicted = '[Ō£¢ ${count}](fg:brightred bg:prev_bg) '
modified = '[Ō£Ü ${count}](fg:mediumorange bg:prev_bg) '
untracked = '[ŌĆ” ${count}](fg:brightestorange bg:prev_bg) '
stashed = '[ŌÜæ ${count}](fg:darkblue bg:prev_bg) '
diverged = '[Ōåō ${behind_count} Ōåæ ${ahead_count}](fg:white bg:prev_bg) '
deleted = '[’æś ${count}](fg:brightred bg:prev_bg) '
renamed = '[Ō×£ ${count}](fg:brightgreen bg:prev_bg) '
typechanged = '[’æÖ ${count}](fg:orange bg:prev_bg) '
# up_to_date	''	The format of up_to_date

[custom.git_dir_sep]
# Separator between git block and directory (only inside a git repo)
command = "printf ''"
when = true
require_repo = true
format = "[Ņé░](fg:prev_bg bg:gray4)"
shell = ["bash", "--noprofile", "--norc"]

[directory]
style = 'fg:gray10 bg:gray4'
format = """
[ $path ]($style)\
[$read_only]($read_only_style)\
"""
truncation_length = 1
# truncation_symbol = 'ŌĆ” Ņé▒ '
truncate_to_repo = false
home_symbol = '~'
read_only = ' ¾░īŠ'
use_os_path_sep = true
fish_style_pwd_dir_length = 3
# substitutions break the fish_style_pwd_dir_length setting...
# substitutions = { '/' = ' Ņé▒ ' }

[jobs]
format = """
[Ņé░](fg:prev_bg bg:mediumorange)\
[ $symbol$number]($style)\
"""
style = 'fg:brightyellow bg:mediumorange'
symbol = 'ŌÜÖ '
symbol_threshold = 1
number_threshold = 1

[status]
style = 'fg:brightestorange bg:stat'
format = """
[Ņé░ ](fg:prev_bg bg:stat)\
[$int ]($style)\
"""
disabled = false

[character]
success_symbol = '[Ņé░](fg:prev_bg)'
error_symbol = '[Ņé░](fg:stat)'
