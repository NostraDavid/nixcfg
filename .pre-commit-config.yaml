default_stages: [pre-commit]

repos:
  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: lint-ruff
        name: lint Python (ruff, local)
        entry: just lint-ruff-files
        language: system
        files: "(\\.py$|^dotfiles/git/\\.config/git/hooks/commit-msg$)"

      - id: lint-shellcheck
        name: lint shell (shellcheck, local)
        entry: just lint-shellcheck-files
        language: system
        files: "(\\.sh$|\\.bashrc$|\\.bash_aliases$)"

      - id: lint-markdown
        name: lint Markdown (markdownlint, local)
        entry: just lint-markdown-files
        language: system
        files: "\\.md$"
        exclude: "^docs/agentskills\\.io/"

      - id: lint-selene
        name: lint Lua (selene, local)
        entry: just lint-selene-files
        language: system
        files: "\\.lua$"

      - id: lint-statix
        name: lint Nix (statix, local)
        entry: just lint-statix-files
        language: system
        files: "\\.nix$"

      - id: lint-deadnix
        name: lint Nix dead code (deadnix, local)
        entry: just lint-deadnix-files
        language: system
        files: "\\.nix$"
